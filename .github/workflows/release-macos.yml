name: Build macOS Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.1.2)
        required: true
      gitee_repo:
        description: Gitee source URL (no credentials in URL)
        required: false
        default: https://gitee.com/psvmc/z-git-tools-wails.git

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Clone from Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ inputs.gitee_repo }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo "::error::Private Gitee repo requires secret GITEE_TOKEN on this repository."
            echo "Create token: https://gitee.com/profile/personal_access_tokens (scope: projects)"
            echo "Then: gh secret set GITEE_TOKEN -R psvmc/z-git-releases"
            exit 1
          fi
          REPO_PATH="${GITEE_REPO#https://}"
          AUTH_URL="https://oauth2:${GITEE_TOKEN}@${REPO_PATH}"
          if git clone --depth 1 --branch "$RELEASE_TAG" "$AUTH_URL" repo 2>/dev/null; then
            echo "Cloned tag $RELEASE_TAG"
          else
            echo "Tag $RELEASE_TAG not found, cloning default branch..."
            git clone --depth 1 "$AUTH_URL" repo
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: repo/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: repo/frontend/package-lock.json

      - name: Build macOS universal
        working-directory: repo
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          cd frontend && npm ci && cd ..
          wails3 task darwin:package:universal
          mkdir -p release
          ditto -c -k --sequesterResource --keepParent bin/ZGit.app release/ZGit-macos-universal.zip
          ls -la release/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: main
          files: repo/release/ZGit-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
